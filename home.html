<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookingHotel — Đặt Phòng Khách Sạn Việt Nam</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
<style>
/* Tab CSS */
.tab-buttons { margin: 20px 0; }
.tab-btn { padding: 10px 20px; cursor: pointer; border: 1px solid #ccc; background: #f5f5f5; margin-right: 5px; }
.tab-btn.active { background: #ffcc00; }
.tab-content { display: none; padding: 10px; border: 1px solid #ccc; margin-top: 5px; }
.tab-content.active { display: block; }
/* Lazy load placeholder */
.lazy { opacity: 0; transition: opacity 0.5s; }
.lazy-loaded { opacity: 1; }
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <a class="logo" href="home.html">
      <img src="logo.png" style="width:50px; height:50px;" alt="logo">
      BookingHotel<span class="logo-dot">.COM</span>
    </a>
  </div>
</header>

<div class="hero">
  <div class="hero-inner">
    <h1 class="hero-title">Tìm Chỗ Nghỉ Hoàn Hảo Của Bạn</h1>

    <div class="search-bar">
      <div class="s-field" style="flex:2">
        <i class="fas fa-map-marker-alt"></i>
        <input type="text" placeholder="Hà Nội, Đà Nẵng, Phú Quốc...">
      </div>
      <div class="s-field">
        <i class="fas fa-calendar-alt"></i>
        <input type="text" id="checkin" placeholder="Nhận phòng">
      </div>
      <div class="s-field">
        <i class="fas fa-calendar-check"></i>
        <input type="text" id="checkout" placeholder="Trả phòng">
      </div>
      <button class="btn-search">Tìm kiếm</button>
    </div>
  </div>
</div>

<div class="page-wrapper">

  <!-- Room types -->
  <div class="room-types-grid">
    <div class="rt-card">
      <img class="rt-img lazy" data-src="https://images.unsplash.com/photo-1631049307264-da0ec9d70304?auto=format&fit=crop&w=400&q=80" alt="Phòng Đôi">
      <div class="rt-name">Phòng Đôi</div>
    </div>
    <div class="rt-card">
      <img class="rt-img lazy" data-src="https://images.unsplash.com/photo-1578683010236-d716f9a3f461?auto=format&fit=crop&w=400&q=80" alt="Phòng Đơn">
      <div class="rt-name">Phòng Đơn</div>
    </div>
  </div>

  <!-- Deals with tabs -->
  <div class="tab-buttons">
    <button class="tab-btn active" data-tab="flash">Flash Sale</button>
    <button class="tab-btn" data-tab="combo">Combo</button>
    <button class="tab-btn" data-tab="luxury">Hạng Sang</button>
  </div>
  <div id="flash" class="tab-content active">
    <p>Deal Flash Sale: Giảm 35%, còn 2 ngày!</p>
  </div>
  <div id="combo" class="tab-content">
    <p>Deal Combo Phú Quốc 3N2Đ All-inclusive</p>
  </div>
  <div id="luxury" class="tab-content">
    <p>Deal Hạng Sang: Suite Đặc Biệt Hà Nội 1 Đêm</p>
  </div>

</div>

<footer>
  <p>&copy; 2026 BookingHotel.com</p>
</footer>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
<script>
$(function() {
  // 1. Datepicker
  $("#checkin, #checkout").datepicker({ dateFormat: "dd-mm-yy", minDate: 0 });

  // 2. Lazy Load
  function lazyLoad() {
    $('.lazy').each(function() {
      if ($(this).offset().top < $(window).scrollTop() + $(window).height()) {
        $(this).attr('src', $(this).data('src')).removeClass('lazy').addClass('lazy-loaded');
      }
    });
  }
  $(window).on('scroll resize', lazyLoad);
  lazyLoad();

  // 3. Tab switch
  $('.tab-btn').click(function() {
    var tab = $(this).data('tab');
    $('.tab-content').removeClass('active');
    $('#' + tab).addClass('active');
    $('.tab-btn').removeClass('active');
    $(this).addClass('active');
  });
});
</script>

</body>
</html>
